# Netlify configuration for Sync monorepo
[build]
  command = "pnpm install && pnpm build:web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9.0.0"

# Use Next.js runtime for server-side rendering
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-DNS-Prefetch-Control = "on"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects for API routes (handled by Next.js)
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200

# Remove trailing slashes
[[redirects]]
  from = "/:path/"
  to = "/:path"
  status = 301
  force = false
